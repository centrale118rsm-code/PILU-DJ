<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ Pilu | Official Mobile Vibe</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #e6a822;
            --gold-glow: rgba(230, 168, 34, 0.4);
            --dark: #050505;
            --light: #f1f1f1;
            --glass: rgba(15, 15, 15, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #ff3366;
            --sc-orange: #ff5500;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            overflow-x: hidden;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        * { box-sizing: border-box; }

        /* --- SPLASH SCREEN --- */
        #enter-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--dark); z-index: 99999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #enter-screen::before {
            content: '🎧'; font-size: 15vw; display: block; margin-bottom: 30px;
            animation: float-emoji 3s ease-in-out infinite;
        }
        @keyframes float-emoji {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .enter-btn {
            padding: 16px 50px; font-size: 4.5vw; font-weight: 800; letter-spacing: 3px;
            color: var(--dark); background: var(--gold); border: none; border-radius: 50px;
            text-transform: uppercase; cursor: pointer; animation: pulse-btn 2s infinite;
            box-shadow: 0 0 25px var(--gold-glow);
            font-family: 'Outfit', sans-serif;
        }
        @keyframes pulse-btn {
            0% { transform: scale(1); box-shadow: 0 0 25px var(--gold-glow); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(230, 168, 34, 0.7); }
            100% { transform: scale(1); box-shadow: 0 0 25px var(--gold-glow); }
        }

        /* --- TOP BAR --- */
        .top-header-bar {
            position: fixed; top: 15px; left: 15px; right: 15px; z-index: 1000;
            display: flex; justify-content: space-between; align-items: flex-start;
            pointer-events: none;
        }

        .social-icons-row { display: flex; flex-direction: row; gap: 7px; pointer-events: auto; }
        .icon-btn {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 17px; text-decoration: none; color: white;
            backdrop-filter: blur(12px); background: var(--glass);
            border: 1px solid var(--glass-border); box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .icon-btn:active { transform: scale(0.85); }
        .icon-wa i { color: #25D366; }
        .icon-ig i { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .icon-lt i { color: #43E660; }
        .icon-sp i { color: #1DB954; }
        .icon-sc i { color: var(--sc-orange); }

        .stats-column { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; pointer-events: auto; }
        .stat-badge {
            display: flex; align-items: center; justify-content: center; gap: 5px;
            backdrop-filter: blur(12px); background: var(--glass);
            border: 1px solid var(--glass-border); color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 20px;
            font-size: 3vw; font-weight: 600; cursor: pointer; user-select: none; transition: all 0.3s ease;
        }
        #like-btn.liked { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 12px rgba(255,51,102,0.4); }

        /* --- AUDIO PLAYER --- */
        .audio-player-widget {
            position: fixed; bottom: 80px; left: 15px; z-index: 900;
            display: flex; align-items: center; gap: 10px; padding: 8px 15px;
            background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border);
            border-radius: 30px; pointer-events: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .play-btn { background: none; border: none; color: var(--gold); font-size: 20px; cursor: pointer; outline: none; }
        .visualizer { display: flex; align-items: flex-end; gap: 3px; height: 15px; margin-left: 5px; }
        .bar { width: 3px; background: var(--gold); border-radius: 3px; height: 3px; transition: height 0.1s; }
        .visualizer.active .bar:nth-child(1) { animation: bounceBar 1.2s infinite ease-in-out; }
        .visualizer.active .bar:nth-child(2) { animation: bounceBar 0.9s infinite ease-in-out 0.1s; }
        .visualizer.active .bar:nth-child(3) { animation: bounceBar 1.5s infinite ease-in-out 0.2s; }
        .visualizer.active .bar:nth-child(4) { animation: bounceBar 1.1s infinite ease-in-out 0.3s; }
        .visualizer.active .bar:nth-child(5) { animation: bounceBar 1.0s infinite ease-in-out 0.15s; }
        @keyframes bounceBar { 0%, 100% { height: 3px; } 50% { height: 15px; } }

        /* --- SMOKE CANVAS --- */
        #smoke-canvas {
            position: fixed; bottom: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; pointer-events: none; opacity: 0.5; mix-blend-mode: screen;
        }

        /* --- HERO SECTION --- */
        #hero {
            position: relative; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1;
            overflow: hidden;
        }
        .video-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2; opacity: 0.55;
            filter: brightness(0.7) contrast(1.1);
        }
        .hero-gradient {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(5,5,5,0.2) 0%, rgba(5,5,5,0.5) 50%, var(--dark) 100%);
            z-index: -1;
        }
        .hero-content { text-align: center; padding: 0 20px; margin-top: 5vh; }
        .status-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            padding: 6px 18px; border-radius: 20px; border: 1px solid var(--gold);
            font-size: 3vw; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); margin-bottom: 15px;
            font-weight: 600;
        }
        .live-dot { width: 8px; height: 8px; background: #ff3333; border-radius: 50%; animation: blink 1s infinite; box-shadow: 0 0 6px #ff3333; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .main-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28vw; margin: 0; color: #fff; text-transform: uppercase;
            line-height: 0.85; letter-spacing: 2vw;
            text-shadow: 0 5px 30px rgba(0,0,0,0.8), 0 0 80px var(--gold-glow);
        }
        .subtitle {
            font-size: 4vw; color: var(--gold); text-transform: uppercase;
            margin-top: 12px; font-weight: 700; letter-spacing: 3px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .scroll-indicator {
            position: absolute; bottom: 4vh; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; z-index: 10;
            cursor: pointer; text-decoration: none;
        }
        .scroll-text {
            font-size: 3vw; color: rgba(255,255,255,0.7); text-transform: uppercase;
            letter-spacing: 3px; margin-bottom: 5px; font-weight: 600;
        }
        .arrows { display: flex; flex-direction: column; align-items: center; }
        .arrow {
            width: 3.5vw; height: 3.5vw;
            border-right: 2px solid var(--gold); border-bottom: 2px solid var(--gold);
            transform: rotate(45deg); margin-top: -1.5vw; animation: arrow-bounce 2s infinite;
        }
        .arrow:nth-child(2) { animation-delay: -0.2s; opacity: 0.5; }
        @keyframes arrow-bounce {
            0% { opacity: 0; transform: rotate(45deg) translate(-5px, -5px); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: rotate(45deg) translate(5px, 5px); }
        }

        /* --- SCROLL REVEAL --- */
        .reveal { opacity: 0; transform: translateY(40px); transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* --- SECTIONS --- */
        .section { position: relative; z-index: 2; padding: 60px 0; overflow: hidden; }
        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 10vw; text-transform: uppercase; color: var(--light);
            text-align: center; margin: 0 auto 35px auto;
            position: relative; display: table; letter-spacing: 3px;
        }
        .section-title::after {
            content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            width: 50px; height: 3px; background: var(--gold); border-radius: 2px;
        }

        /* --- EVENTS / LOCANDINE --- */
        .events-wrapper { padding: 0 20px; }
        .events-divider {
            text-align: center; padding: 25px 0 15px; font-size: 3.5vw; font-weight: 700;
            text-transform: uppercase; letter-spacing: 3px; color: #666;
        }
        .events-divider span {
            background: var(--dark); padding: 0 15px; position: relative;
        }
        .events-divider::before {
            content: ''; display: block; width: 60%; height: 1px;
            background: rgba(255,255,255,0.1); margin: 0 auto;
            position: relative; top: 14px;
        }
        .event-card {
            background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 16px; overflow: hidden; margin-bottom: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            transition: transform 0.3s ease;
        }
        .event-card.concluded { opacity: 0.6; }
        .flyer-img { width: 100%; display: block; }
        .timer-container {
            padding: 18px; text-align: center;
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.7) 100%);
        }
        .timer-title { color: #999; font-size: 3vw; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        .countdown { display: flex; justify-content: center; gap: 12px; }
        .time-box { display: flex; flex-direction: column; align-items: center; }
        .time-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 8vw; font-weight: 800; color: var(--gold);
            line-height: 1;
        }
        .time-lbl { font-size: 2.5vw; color: #777; text-transform: uppercase; letter-spacing: 1px; }
        .ended-text {
            color: #888; font-size: 4vw; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- GALLERY --- */
        .gallery-wrapper { padding: 0 10px; }
        .gallery-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px;
        }
        .gallery-item {
            position: relative; width: 100%; aspect-ratio: 1 / 1;
            overflow: hidden; cursor: pointer;
        }
        .gallery-item img, .gallery-item video {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.85); transition: all 0.3s ease;
        }
        .gallery-item:active img, .gallery-item:active video {
            filter: brightness(1.1);
            transform: scale(1.05);
        }
        .gallery-item.video-item::after {
            content: '▶'; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8vw; color: rgba(255,255,255,0.85);
            text-shadow: 0 2px 15px rgba(0,0,0,0.8);
            pointer-events: none; z-index: 2;
        }
        .gallery-item.wide { grid-column: span 2; aspect-ratio: 2 / 1; }

        /* --- LIGHTBOX --- */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.97); z-index: 9999;
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
            flex-direction: column;
        }
        #lightbox.show { display: flex; opacity: 1; }
        #lightbox-img, #lightbox-video {
            max-width: 95%; max-height: 85%;
            border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.8);
            display: none;
        }
        #lightbox-close {
            position: absolute; top: 20px; right: 20px;
            color: white; font-size: 28px; cursor: pointer; z-index: 10;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1); border-radius: 50%; border: none;
            backdrop-filter: blur(10px);
        }

        /* --- SOCIAL LINKS --- */
        .links-wrapper { padding: 0 20px; }
        .premium-link {
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 16px; margin-bottom: 12px;
            border-radius: 50px; text-decoration: none; font-weight: 700;
            font-size: 4vw; text-transform: uppercase; color: #fff; letter-spacing: 1px;
            background: var(--glass); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .premium-link:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .premium-link i { font-size: 5.5vw; margin-right: 12px; }
        .btn-wa i { color: #25D366; }
        .btn-ig i { color: #E1306C; }
        .btn-lt i { color: #43E660; }
        .btn-sc i { color: var(--sc-orange); }

        /* --- FLOATING BUTTON --- */
        .floating-book-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            background: var(--gold); color: var(--dark);
            width: 56px; height: 56px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; box-shadow: 0 5px 25px var(--gold-glow);
            text-decoration: none;
            animation: float-btn 3s ease-in-out infinite;
        }
        @keyframes float-btn {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* --- FOOTER --- */
        footer {
            text-align: center; padding: 50px 20px 110px;
            color: #444; font-size: 3.2vw;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        footer .footer-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 8vw; color: rgba(255,255,255,0.08);
            letter-spacing: 5px; margin-bottom: 10px;
        }

        /* --- SMOOTH TRANSITIONS --- */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>

    <script>
        /* ===== CONFIGURATION ===== */

        // Events data — add/remove events here. Order doesn't matter, JS sorts them.
        const eventsData = [
            { img: "Locandina.jpg",  title: "Time to Boiler Room",      date: "2026-02-20T20:00:00" },
            { img: "Locandina1.jpg", title: "Time to Vegas City",       date: "2026-02-21T20:00:00" },
        ];

        // Gallery items — videos first for prominence, then photos
        const galleryItems = [
            { type: "video", src: "video2.mp4" },
            { type: "video", src: "video3.mp4" },
        ];
        // Add foto1 through foto26
        for (let i = 1; i <= 26; i++) {
            galleryItems.push({ type: "image", src: `foto${i}.jpg` });
        }

        /* ===== SPLASH & AUDIO ===== */
        const enterScreen = document.getElementById('enter-screen');
        const startBtn = document.getElementById('start-experience');
        const audio = document.getElementById('bg-audio');
        const heroVideo = document.getElementById('hero-video');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const visualizer = document.getElementById('audio-visualizer');

        startBtn.addEventListener('click', () => {
            enterScreen.style.opacity = '0';
            setTimeout(() => { enterScreen.style.visibility = 'hidden'; enterScreen.style.display = 'none'; }, 800);

            // Start audio
            audio.volume = 0.8;
            audio.play().then(() => {
                visualizer.classList.add('active');
            }).catch(e => console.log("Audio error:", e));

            // Start hero video (muted, no sound)
            heroVideo.play().catch(e => console.log("Video error:", e));

            inizializzaContatoreVisite();
        });

        /* ===== PLAYER CONTROLS ===== */
        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
                visualizer.classList.add('active');
            } else {
                audio.pause();
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
                visualizer.classList.remove('active');
            }
        });

        /* ===== VIEWS & LIKES ===== */
        function inizializzaContatoreVisite() {
            let visite = localStorage.getItem('pilu_views');
            if (!visite) visite = Math.floor(Math.random() * (2500 - 1000) + 1000);
            visite = parseInt(visite) + 1;
            localStorage.setItem('pilu_views', visite);
            document.getElementById('view-counter').innerText = visite.toLocaleString('it-IT');

            if (localStorage.getItem('pilu_liked') === 'true') {
                document.getElementById('like-btn').classList.add('liked');
                document.getElementById('like-text').innerText = "Ti Piace";
            }
        }

        function toggleLike() {
            const btn = document.getElementById('like-btn');
            const testo = document.getElementById('like-text');
            if (btn.classList.contains('liked')) {
                btn.classList.remove('liked'); testo.innerText = 'Mi Piace';
                localStorage.setItem('pilu_liked', 'false');
            } else {
                btn.classList.add('liked'); testo.innerText = 'Ti Piace';
                localStorage.setItem('pilu_liked', 'true');
            }
        }

        /* ===== EVENTS — Sorted chronologically ===== */
        function buildEvents() {
            const container = document.getElementById('events-container');
            const now = Date.now();

            // Sort: upcoming first (nearest to farthest), then concluded (most recent first)
            const upcoming = eventsData
                .filter(e => new Date(e.date).getTime() > now)
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            const concluded = eventsData
                .filter(e => new Date(e.date).getTime() <= now)
                .sort((a, b) => new Date(b.date) - new Date(a.date));

            function createCard(ev, isConcluded) {
                const card = document.createElement('div');
                card.className = 'event-card' + (isConcluded ? ' concluded' : '');
                card.innerHTML = `
                    <img src="${ev.img}" class="flyer-img" alt="${ev.title}" loading="lazy">
                    <div class="timer-container">
                        <div class="timer-title">${ev.title}</div>
                        <div class="countdown" data-date="${ev.date}"></div>
                    </div>
                `;
                return card;
            }

            upcoming.forEach(ev => container.appendChild(createCard(ev, false)));

            if (concluded.length > 0) {
                const divider = document.createElement('div');
                divider.className = 'events-divider';
                divider.innerHTML = '<span>Eventi Conclusi</span>';
                container.appendChild(divider);
                concluded.forEach(ev => container.appendChild(createCard(ev, true)));
            }
        }
        buildEvents();

        /* ===== COUNTDOWN ===== */
        function updateCountdowns() {
            const now = Date.now();
            document.querySelectorAll('.countdown').forEach(el => {
                const target = new Date(el.getAttribute('data-date')).getTime();
                const diff = target - now;

                if (diff <= 0) {
                    el.innerHTML = "<span class='ended-text'>Evento Concluso</span>";
                    return;
                }

                const g = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);

                el.innerHTML = `
                    <div class="time-box"><span class="time-val">${g}</span><span class="time-lbl">GG</span></div>
                    <div class="time-box"><span class="time-val">${h}</span><span class="time-lbl">ORE</span></div>
                    <div class="time-box"><span class="time-val">${m}</span><span class="time-lbl">MIN</span></div>
                    <div class="time-box"><span class="time-val">${s}</span><span class="time-lbl">SEC</span></div>
                `;
            });
        }
        setInterval(updateCountdowns, 1000);
        updateCountdowns();

        /* ===== GALLERY ===== */
        function buildGallery() {
            const grid = document.getElementById('gallery-grid');

            galleryItems.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'gallery-item' + (item.type === 'video' ? ' video-item wide' : '');

                if (item.type === 'video') {
                    const vid = document.createElement('video');
                    vid.src = item.src;
                    vid.muted = true;
                    vid.loop = true;
                    vid.playsInline = true;
                    vid.preload = 'metadata';
                    vid.setAttribute('playsinline', '');
                    div.appendChild(vid);
                    div.addEventListener('click', () => openLightboxVideo(item.src));

                    // Auto-play preview on scroll into view
                    const observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) vid.play().catch(() => {});
                            else vid.pause();
                        });
                    }, { threshold: 0.3 });
                    observer.observe(div);
                } else {
                    const img = document.createElement('img');
                    img.src = item.src;
                    img.alt = 'DJ Pilu';
                    img.loading = 'lazy';
                    div.appendChild(img);
                    div.addEventListener('click', () => openLightboxImage(item.src));
                }

                grid.appendChild(div);
            });
        }
        buildGallery();

        /* ===== LIGHTBOX ===== */
        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        const lbVid = document.getElementById('lightbox-video');

        function openLightboxImage(src) {
            lbImg.src = src;
            lbImg.style.display = 'block';
            lbVid.style.display = 'none';
            lbVid.pause();
            lightbox.classList.add('show');
        }

        function openLightboxVideo(src) {
            lbVid.src = src;
            lbVid.style.display = 'block';
            lbImg.style.display = 'none';
            lightbox.classList.add('show');
            lbVid.play().catch(() => {});
        }

        function closeLightbox() {
            lightbox.classList.remove('show');
            lbVid.pause();
            lbVid.src = '';
            lbImg.src = '';
        }

        // Close lightbox on background click (not on media click)
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox || e.target === document.getElementById('lightbox-close')) {
                closeLightbox();
            }
        });

        /* ===== SCROLL REVEAL ===== */
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

        /* ===== SMOKE ENGINE ===== */
        const canvas = document.getElementById('smoke-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        for (let i = 0; i < 35; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: canvas.height + Math.random() * 200,
                r: Math.random() * 90 + 40,
                vx: Math.random() * 0.4 - 0.2,
                vy: Math.random() * -0.8 - 0.3,
                opacity: Math.random() * 0.05 + 0.015
            });
        }

        function drawSmoke() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.y < -p.r * 2) { p.y = canvas.height + p.r; p.x = Math.random() * canvas.width; }
                if (p.x < -p.r) p.x = canvas.width + p.r;
                if (p.x > canvas.width + p.r) p.x = -p.r;

                ctx.beginPath();
                const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
                grad.addColorStop(0, `rgba(200, 180, 150, ${p.opacity})`);
                grad.addColorStop(1, 'rgba(200, 180, 150, 0)');
                ctx.fillStyle = grad;
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(drawSmoke);
        }
        drawSmoke();
    </script>
</body>
</html>
